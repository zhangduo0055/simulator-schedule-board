<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>河南航投航空培训中心 · 模拟机排程 · 大屏展示</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
html, body {
  width:100%; height:100%; overflow:hidden;
  background:#0f172a; font-family:'Microsoft YaHei','PingFang SC',sans-serif;
}

/* 顶部状态栏 */
.status-bar {
  position:fixed; top:0; left:0; right:0; z-index:100;
  height:36px; background:#0f172a; border-bottom:1px solid #1e293b;
  display:flex; align-items:center; justify-content:space-between;
  padding:0 20px; font-size:12px; color:#64748b;
}
.status-bar .left { display:flex; align-items:center; gap:12px; }
.status-bar .logo { color:#38bdf8; font-weight:700; font-size:13px; letter-spacing:0.5px; }
.status-bar .badge {
  background:#1e293b; border:1px solid #334155; border-radius:4px;
  padding:2px 8px; color:#94a3b8;
}
.status-bar .badge.live {
  border-color:#22c55e; color:#22c55e;
  animation: pulse-border 2s infinite;
}
@keyframes pulse-border {
  0%,100% { border-color:#22c55e; }
  50% { border-color:#166534; }
}
.status-bar .right { display:flex; align-items:center; gap:16px; }
.countdown-ring {
  width:24px; height:24px; transform:rotate(-90deg);
}
.countdown-ring circle {
  fill:none; stroke:#334155; stroke-width:3;
}
.countdown-ring .progress {
  stroke:#38bdf8; stroke-width:3; stroke-linecap:round;
  stroke-dasharray: 60;
  transition:stroke-dashoffset 1s linear;
}

/* iframe 铺满 */
#board-frame {
  position:fixed; top:36px; left:0; right:0; bottom:0;
  width:100%; height:calc(100% - 36px);
  border:none; display:block;
}

/* 刷新遮罩 */
.refresh-mask {
  display:none;
  position:fixed; inset:0; z-index:200;
  background:rgba(15,23,42,0.85);
  align-items:center; justify-content:center;
  flex-direction:column; gap:16px;
}
.refresh-mask.show { display:flex; }
.spinner {
  width:48px; height:48px;
  border:4px solid #334155; border-top-color:#38bdf8;
  border-radius:50%; animation:spin .8s linear infinite;
}
@keyframes spin { to { transform:rotate(360deg); } }
.refresh-mask p { color:#94a3b8; font-size:14px; }
</style>
</head>
<body>

<!-- 状态栏 -->
<div class="status-bar">
  <div class="left">
    <span class="logo">🛩 河南航投航空培训中心</span>
    <span class="badge">模拟机排程 · 2026年6月</span>
    <span class="badge live" id="liveTag">● 实时展示</span>
  </div>
  <div class="right">
    <span id="lastUpdate" style="color:#475569">--</span>
    <span style="color:#475569">下次刷新</span>
    <svg class="countdown-ring" viewBox="0 0 24 24">
      <circle cx="12" cy="12" r="9.5"/>
      <circle class="progress" cx="12" cy="12" r="9.5" id="countdownRing"/>
    </svg>
    <span id="countdownText" style="color:#38bdf8;font-weight:700;width:28px;text-align:right">30s</span>
  </div>
</div>

<!-- 展板 iframe -->
<iframe id="board-frame" src="" sandbox="allow-scripts allow-same-origin"></iframe>

<!-- 刷新遮罩 -->
<div class="refresh-mask" id="refreshMask">
  <div class="spinner"></div>
  <p>正在获取最新排程数据…</p>
</div>

<script>
// ══════════════════════
// 配置
// ══════════════════════
const BOARD_URL = 'https://zhangduo0055.github.io/simulator-schedule-board/index.html?mode=display';
const REFRESH_SEC = 30;  // 自动刷新间隔（秒）

// ══════════════════════
// 状态
// ══════════════════════
let countdown = REFRESH_SEC;
const ring = document.getElementById('countdownRing');
const ringCircumference = 60; // 2π×r ≈ 2×3.14159×9.55 ≈ 60

function updateRing(sec) {
  const offset = ringCircumference - (sec / REFRESH_SEC) * ringCircumference;
  ring.style.strokeDashoffset = offset;
}

function setLastUpdate() {
  const now = new Date();
  document.getElementById('lastUpdate').textContent =
    '上次更新 ' + now.toLocaleTimeString('zh-CN', {hour:'2-digit', minute:'2-digit', second:'2-digit'});
}

function loadBoard() {
  document.getElementById('refreshMask').classList.add('show');
  const frame = document.getElementById('board-frame');
  // 强制绕过缓存
  const url = BOARD_URL + '&_t=' + Date.now();
  frame.onload = function() {
    document.getElementById('refreshMask').classList.remove('show');
    setLastUpdate();
  };
  frame.src = url;
  countdown = REFRESH_SEC;
  updateRing(countdown);
}

// 倒计时 tick
setInterval(() => {
  countdown--;
  if (countdown <= 0) {
    loadBoard();
    countdown = REFRESH_SEC;
  }
  document.getElementById('countdownText').textContent = countdown + 's';
  updateRing(countdown);
}, 1000);

// 初次加载
loadBoard();
</script>
</body>
</html>
