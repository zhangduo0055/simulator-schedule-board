<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>河南航投航空培训中心 · 模拟机排程展板</title>
<style>
:root {
  --bg: #0f172a;
  --card: #1e293b;
  --border: #334155;
  --text: #e2e8f0;
  --muted: #94a3b8;
  --accent: #38bdf8;
  --row-h: 58px;
}
* { margin:0; padding:0; box-sizing:border-box; }
body {
  font-family: 'Microsoft YaHei', 'PingFang SC', 'Noto Sans SC', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  padding: 20px 28px;
}
.top-bar {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 16px; flex-wrap: wrap; gap: 12px;
}
.top-bar h1 {
  font-size: 24px; font-weight: 800; letter-spacing: 0.5px;
}
.top-bar h1 span { color: var(--accent); font-weight: 600; font-size: 18px; }
.top-bar .update-time { color: var(--muted); font-size: 12px; }
.right-ctrls { display: flex; gap: 12px; align-items: center; }
.right-ctrls select {
  padding: 10px 16px; border-radius: 10px; border: 1px solid var(--border);
  background: var(--card); color: var(--text); font-size: 15px; cursor: pointer;
  font-family: inherit; outline: none; transition: border .2s;
}
.right-ctrls select:focus { border-color: var(--accent); }
.stat-badge {
  display: flex; gap: 16px; font-size: 14px; color: var(--muted);
}
.stat-badge strong { color: var(--text); }

.legend {
  display: flex; gap: 18px; flex-wrap: wrap; margin-bottom: 14px;
  padding: 10px 18px; background: var(--card); border-radius: 10px;
  border: 1px solid var(--border); font-size: 14px;
}
.legend-item { display: flex; align-items: center; gap: 8px; }
.legend-dot { width: 16px; height: 16px; border-radius: 4px; flex-shrink: 0; }

.table-wrap {
  overflow: auto; max-height: 82vh;
  background: var(--card); border-radius: 14px;
  border: 1px solid var(--border);
  box-shadow: 0 4px 24px rgba(0,0,0,.3);
}

table { border-collapse: collapse; min-width: 100%; table-layout: fixed; }
th, td { border: 1px solid var(--border); text-align: center; vertical-align: middle; }

th {
  background: #111827; color: var(--muted); font-weight: 600;
  font-size: 12px; position: sticky; top: 0; z-index: 3; padding: 6px 1px;
  white-space: nowrap;
}
th.date-col {
  position: sticky; left: 0; z-index: 5;
  background: #111827; min-width: 70px; font-size: 14px; color: var(--text);
}
th.corner { z-index: 6; }

td {
  padding: 0; transition: background .15s;
  font-size: 11px;
}
td:first-child {
  background: #111827; font-weight: 700; color: var(--text); font-size: 14px;
  position: sticky; left: 0; z-index: 2;
  padding: 4px; min-width: 70px;
}
td:first-child .dow { font-size: 11px; color: var(--muted); font-weight: 400; }
td.empty { background: #0f1a2e; }
td.empty:nth-child(even) { background: #111d33; }

.task-block {
  width: 100%; height: 100%; padding: 4px 2px;
  display: flex; flex-direction: column; align-items: center;
  justify-content: center; border-radius: 3px;
  cursor: pointer; transition: all .15s; min-height: var(--row-h);
  position: relative; overflow: hidden;
  font-weight: 600; letter-spacing: 0.3px;
}
.task-block:hover {
  filter: brightness(1.12);
  transform: scale(1.03);
  z-index: 10;
  box-shadow: 0 4px 18px rgba(0,0,0,.5);
}
.task-block .client { font-size: 12px; line-height: 1.2; }
.task-block .time { font-size: 10px; opacity: .85; margin-top: 1px; }
.task-block .course { font-size: 9px; opacity: .7; margin-top: 1px; max-width: 100%; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

.tooltip {
  display: none; position: fixed; z-index: 100;
  background: var(--card); color: var(--text);
  border: 1px solid var(--border); border-radius: 12px;
  padding: 14px 18px; font-size: 14px; max-width: 320px;
  box-shadow: 0 8px 32px rgba(0,0,0,.7);
  pointer-events: none; line-height: 1.8;
}
.tooltip.show { display: block; }
.tooltip b { font-size: 15px; }
.tooltip .dim { color: var(--muted); }

.table-wrap::-webkit-scrollbar { width:8px; height:8px; }
.table-wrap::-webkit-scrollbar-track { background: #0f172a; }
.table-wrap::-webkit-scrollbar-thumb { background: #475569; border-radius:4px; }
</style>
</head>

</div>
<div class="legend" id="legend"></div>
<div class="table-wrap"><table id="ganttTable"><thead id="ganttHead"></thead><tbody id="ganttBody"></tbody></table></div>
<div class="tooltip" id="tooltip"></div>

  "个人自费": {
    "bg": "#8B5CF6",
    "hover": "#7C3AED",
    "text": "#fff"
  },
  "邮政航空": {
    "bg": "#06B6D4",
    "hover": "#0891B2",
    "text": "#fff"
  },
  "江西航空": {
    "bg": "#10B981",
    "hover": "#059669",
    "text": "#fff"
  },
  "乌鲁木齐航空": {
    "bg": "#EC4899",
    "hover": "#DB2777",
    "text": "#fff"
  },
  "东航": {
    "bg": "#6366F1",
    "hover": "#4F46E5",
    "text": "#fff"
  },
  "南航": {
    "bg": "#14B8A6",
    "hover": "#0D9488",
    "text": "#fff"
  },
  "河北航": {
    "bg": "#F59E0B",
    "hover": "#D97706",

  },
  "龙浩": {
    "bg": "#3B82F6",
    "hover": "#2563EB",
    "text": "#fff"
  },
  "邮航": {
    "bg": "#06B6D4",
    "hover": "#0891B2",
    "text": "#fff"
  },
  "其他航司": {
    "bg": "#6B7280",
    "hover": "#4B5563",
    "text": "#fff"
  },
  "default": {
    "bg": "#6B7280",
    "hover": "#4B5563",
    "text": "#fff"
  }
};
const MONTH = 6, YEAR = 2026;

function tm(s) {
  if (!s || s==='nan') return 0;
  const t = s.includes(' ') ? s.split(' ')[1] : s;
  const p = t.split(':');
  return parseInt(p[0])*60 + parseInt(p[1]);
}

function db(val) { return val && val !== 'nan' ? val : ''; }

function render() {
  const filter = document.getElementById('craftFilter').value;
  let tasks = filter==='all' ? ALL : ALL.filter(t=>t.机位===filter);

  let loMin = 24*60, hiMin = 0;
  tasks.forEach(t=>{
    const s=tm(t.起), e=tm(t.止);
    if(s>0) loMin = Math.min(loMin, s);
    if(e>0) hiMin = Math.max(hiMin, e);
  });
  if (loMin>=hiMin) { loMin=7*60; hiMin=22*60; }
  const loSlot = Math.max(0, Math.floor(loMin/30) - 2);
  const hiSlot = Math.ceil(hiMin/30) + 2;
  
  function slotH(slot) { return Math.floor(slot/2); }
  function slotLabel(slot) { return `${slotH(slot).toString().padStart(2,'0')}:${slot%2===0?'00':'30'}`; }
  
  const grid = {};
  tasks.forEach(t=>{
    if (!t.日期 || t.日期==='nan') return;
    const day = parseInt(t.日期.substring(8,10));
    const sm = tm(t.起), em = tm(t.止);
    const startSlot = Math.max(0, Math.floor(sm/30));
    const endSlot = Math.ceil(em/30);
    const client = db(t.客户航司);
    const color = COLORS[client] || COLORS['default'] || {bg:'#6b7280',hover:'#4b5563',text:'#fff'};
    if (!grid[day]) grid[day] = {};
    
    for (let si = startSlot; si < endSlot; si++) {
      if (si < loSlot || si >= hiSlot) continue;
      const idx = si - loSlot;
      if (!grid[day][idx]) {
        grid[day][idx] = {
          client, course:db(t.课目类型),
          stStr:(t.起||'').split(' ').pop()||'',
          etStr:(t.止||'').split(' ').pop()||'',
          duration: db(t.时长h),
          students:db(t.学员), trainer:db(t.教员), inspector:db(t.检查员),
          color, colspan: 1, isStart: false
        };
      }
    }
    const firstIdx = startSlot - loSlot;
    if (grid[day] && grid[day][firstIdx]) {
      grid[day][firstIdx].isStart = true;
      grid[day][firstIdx].colspan = Math.min(endSlot, hiSlot) - Math.max(startSlot, loSlot);
    }
  });

  const usedDays = Object.keys(grid).map(Number).sort((a,b)=>a-b);
  const WDAYS = ['日','一','二','三','四','五','六'];

  const clients = [...new Set(tasks.map(t=>db(t.客户航司)).filter(Boolean))];
  document.getElementById('legend').innerHTML = clients.map(c=>{
    const co = COLORS[c]||COLORS['default']||{bg:'#6b7280'};
    return `<div class="legend-item"><span class="legend-dot" style="background:${co.bg}"></span>${c}</div>`;
  }).join('');
  document.getElementById('stats').innerHTML = `<strong>${tasks.length}</strong>场 · <strong>${clients.length}</strong>家航司`;

  let thead = '<tr><th class="corner date-col" style="white-space:normal;">日期<br>航司</th>';
  for (let si=loSlot; si<hiSlot; si++) {
    thead += `<th>${slotLabel(si)}</th>`;
  }
  thead += '</tr>';
  document.getElementById('ganttHead').innerHTML = thead;

  let tbody = '';
  usedDays.forEach(day=>{
    const ds = `${YEAR}-${MONTH.toString().padStart(2,'0')}-${day.toString().padStart(2,'0')}`;
    const wd = WDAYS[new Date(ds).getDay()];
    tbody += `<tr><td>${day}<span class="dow"> 周${wd}</span></td>`;
    
    let si = loSlot;
    while (si < hiSlot) {
      const idx = si - loSlot;
      const g = grid[day] && grid[day][idx];
      if (g && g.isStart) {
        const jdata = JSON.stringify({client:g.client,course:g.course,stStr:g.stStr,etStr:g.etStr,duration:g.duration,students:g.students,trainer:g.trainer,inspector:g.inspector}).replace(/"/g,'&quot;');
        tbody += `<td colspan="${g.colspan}"><div class="task-block" style="background:${g.color.bg};color:${g.color.text}"
          onmouseenter="showTip(event, this, ${jdata})" onmouseleave="hideTip()">
          <span class="client">${g.client.replace('航空','')}</span>
          <span class="time">${g.stStr}-${g.etStr} (${g.duration}h)</span>
        </div></td>`;
        si += g.colspan;
      } else {
        tbody += '<td class="empty"></td>';
        si++;
      }
    }
    tbody += '</tr>';
  });
  document.getElementById('ganttBody').innerHTML = tbody;
}

function showTip(e, el, g) {
  const tt = document.getElementById('tooltip');
  const lines = [];
  if(g.course) lines.push(`<b>${g.course}</b>`);
  lines.push(`<span class="dim">时间:</span> ${g.stStr} - ${g.etStr} (${g.duration}h)`);
  if(g.students) lines.push(`<span class="dim">学员:</span> ${g.students}`);
  if(g.trainer) lines.push(`<span class="dim">教员:</span> ${g.trainer}`);
  if(g.inspector) lines.push(`<span class="dim">检查员:</span> ${g.inspector}`);
  tt.innerHTML = lines.join('<br>');
  tt.classList.add('show');
  const x = Math.min(e.clientX+14, window.innerWidth-340);
  tt.style.left = x+'px';
  tt.style.top = (e.clientY-10)+'px';
}
function hideTip() { document.getElementById('tooltip').classList.remove('show'); }

render();
</script>
