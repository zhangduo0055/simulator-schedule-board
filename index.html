<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>河南航投航空培训中心 · 模拟机排程展板（可编辑）</title>
<style>
:root {
  --bg: #0f172a; --card: #1e293b; --border: #334155;
  --text: #e2e8f0; --muted: #94a3b8; --accent: #38bdf8;
  --row-h: 58px; --green: #22c55e; --yellow: #eab308; --red: #ef4444;
}
* { margin:0; padding:0; box-sizing:border-box; }
body {
  font-family: 'Microsoft YaHei', 'PingFang SC', 'Noto Sans SC', sans-serif;
  background: var(--bg); color: var(--text); min-height: 100vh; padding: 20px 28px;
}
/* ── 顶部 ── */
.top-bar { display:flex; align-items:center; justify-content:space-between; margin-bottom:16px; flex-wrap:wrap; gap:12px; }
.top-bar h1 { font-size:24px; font-weight:800; letter-spacing:0.5px; }
.top-bar h1 span { color:var(--accent); font-weight:600; font-size:18px; }
.top-bar .update-time { color:var(--muted); font-size:12px; }
.right-ctrls { display:flex; gap:8px; align-items:center; flex-wrap:wrap; }
.right-ctrls select, .ctrl-btn {
  padding:10px 16px; border-radius:10px; border:1px solid var(--border);
  background:var(--card); color:var(--text); font-size:14px; cursor:pointer;
  font-family:inherit; outline:none; transition:border .2s, background .2s;
}
.right-ctrls select:focus { border-color:var(--accent); }
.ctrl-btn:hover { background:#334155; border-color:var(--accent); }
.ctrl-btn.primary { background:var(--accent); color:#000; border-color:var(--accent); font-weight:600; }
.ctrl-btn.primary:hover { background:#7dd3fc; }
.ctrl-btn.danger { border-color:var(--red); color:var(--red); }
.ctrl-btn.danger:hover { background:#7f1d1d; }
.ctrl-btn.export { border-color:var(--green); color:var(--green); }
.ctrl-btn.export:hover { background:#14532d; }
.change-badge {
  display:inline-flex; align-items:center; justify-content:center;
  width:22px; height:22px; border-radius:50%; background:var(--yellow);
  color:#000; font-size:11px; font-weight:800; margin-left:-4px; display:none;
}
.stat-badge { display:flex; gap:16px; font-size:14px; color:var(--muted); }
.stat-badge strong { color:var(--text); }

/* ── 图例 ── */
.legend { display:flex; gap:18px; flex-wrap:wrap; margin-bottom:14px; padding:10px 18px; background:var(--card); border-radius:10px; border:1px solid var(--border); font-size:14px; }
.legend-item { display:flex; align-items:center; gap:8px; }
.legend-dot { width:16px; height:16px; border-radius:4px; flex-shrink:0; }

/* ── 表格 ── */
.table-wrap { overflow:auto; max-height:78vh; background:var(--card); border-radius:14px; border:1px solid var(--border); box-shadow:0 4px 24px rgba(0,0,0,.3); }
table { border-collapse:collapse; min-width:100%; table-layout:fixed; }
th, td { border:1px solid var(--border); text-align:center; vertical-align:middle; }
th { background:#111827; color:var(--muted); font-weight:600; font-size:12px; position:sticky; top:0; z-index:3; padding:6px 1px; white-space:nowrap; }
th.date-col { position:sticky; left:0; z-index:5; background:#111827; min-width:70px; font-size:14px; color:var(--text); }
th.corner { z-index:6; }
td { padding:0; transition:background .15s; font-size:11px; }
td:first-child { background:#111827; font-weight:700; color:var(--text); font-size:14px; position:sticky; left:0; z-index:2; padding:4px; min-width:70px; }
td:first-child .dow { font-size:11px; color:var(--muted); font-weight:400; }
td.empty { background:#0f1a2e; }
td.empty:nth-child(even) { background:#111d33; }

.task-block {
  width:100%; height:100%; padding:4px 2px;
  display:flex; flex-direction:column; align-items:center;
  justify-content:center; border-radius:3px;
  cursor:pointer; transition:all .15s; min-height:var(--row-h);
  position:relative; overflow:hidden;
  font-weight:600; letter-spacing:0.3px;
}
.task-block:hover { filter:brightness(1.12); transform:scale(1.03); z-index:10; box-shadow:0 4px 18px rgba(0,0,0,.5); }
.task-block .client { font-size:12px; line-height:1.2; }
.task-block .time { font-size:10px; opacity:.85; margin-top:1px; }
.task-block .course { font-size:9px; opacity:.7; margin-top:1px; max-width:100%; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }

/* 变更标记 */
.task-block.changed { border-left:4px solid var(--yellow); }
.task-block.added   { border-left:4px solid var(--green); }
.task-block .edit-icon {
  position:absolute; top:2px; right:2px; font-size:10px; opacity:0; transition:opacity .15s;
}
.task-block:hover .edit-icon { opacity:0.85; }

/* ── 模态框 ── */
.modal-overlay {
  display:none; position:fixed; inset:0; z-index:200;
  background:rgba(0,0,0,.65); justify-content:center; align-items:center;
}
.modal-overlay.active { display:flex; }
.modal-box {
  background:var(--card); border:1px solid var(--border); border-radius:16px;
  padding:28px 32px; width:520px; max-height:90vh; overflow-y:auto;
  box-shadow:0 12px 48px rgba(0,0,0,.6); animation:fadeIn .2s;
}
@keyframes fadeIn { from{opacity:0;transform:scale(.95)} to{opacity:1;transform:scale(1)} }
.modal-box h2 { font-size:20px; margin-bottom:20px; display:flex; align-items:center; gap:8px; }
.modal-box h2 .tag { font-size:12px; padding:2px 8px; border-radius:6px; }
.modal-box h2 .tag.new { background:var(--green); color:#000; }
.modal-box h2 .tag.edit { background:var(--yellow); color:#000; }
.modal-box h2 .tag.delete { background:var(--red); color:#fff; }

.form-row { display:flex; gap:12px; margin-bottom:14px; }
.form-row label { display:flex; flex-direction:column; gap:4px; font-size:13px; color:var(--muted); flex:1; }
.form-row label input, .form-row label select {
  padding:10px 12px; border-radius:8px; border:1px solid var(--border);
  background:#0f172a; color:var(--text); font-size:14px; font-family:inherit; outline:none;
  transition:border .2s;
}
.form-row label input:focus, .form-row label select:focus { border-color:var(--accent); }
.form-row label input[type="date"]::-webkit-calendar-picker-indicator,
.form-row label input[type="time"]::-webkit-calendar-picker-indicator { filter:invert(1); }

.form-actions { display:flex; gap:10px; justify-content:flex-end; margin-top:20px; }
.form-actions button {
  padding:10px 20px; border-radius:8px; border:1px solid var(--border);
  font-size:14px; font-weight:600; cursor:pointer; font-family:inherit;
  transition:all .15s;
}
.btn-save { background:var(--accent); color:#000; border-color:var(--accent); }
.btn-save:hover { background:#7dd3fc; }
.btn-cancel { background:transparent; color:var(--muted); }
.btn-cancel:hover { background:#1e293b; color:var(--text); }
.btn-delete { background:transparent; color:var(--red); border-color:var(--red); margin-right:auto; }
.btn-delete:hover { background:#7f1d1d; color:#fff; }

/* ── Toast ── */
.toast {
  position:fixed; bottom:30px; left:50%; transform:translateX(-50%);
  padding:12px 28px; border-radius:10px; font-size:14px; font-weight:600;
  z-index:300; opacity:0; transition:opacity .3s; pointer-events:none;
}
.toast.show { opacity:1; }
.toast.success { background:#14532d; color:var(--green); border:1px solid var(--green); }
.toast.error { background:#7f1d1d; color:var(--red); border:1px solid var(--red); }

/* ── 提示框 ── */
.tooltip {
  display:none; position:fixed; z-index:100;
  background:var(--card); color:var(--text);
  border:1px solid var(--border); border-radius:12px;
  padding:14px 18px; font-size:14px; max-width:320px;
  box-shadow:0 8px 32px rgba(0,0,0,.7);
  pointer-events:none; line-height:1.8;
}
.tooltip.show { display:block; }
.tooltip b { font-size:15px; }
.tooltip .dim { color:var(--muted); }

.table-wrap::-webkit-scrollbar { width:8px; height:8px; }
.table-wrap::-webkit-scrollbar-track { background:#0f172a; }
.table-wrap::-webkit-scrollbar-thumb { background:#475569; border-radius:4px; }

/* ── 拖拽相关 ── */
.drag-handle { font-size:11px; color:rgba(255,255,255,.4); cursor:grab; line-height:1; user-select:none; }
.resize-handle { font-size:14px; color:rgba(255,255,255,.3); cursor:ew-resize; line-height:1; user-select:none; position:absolute; right:4px; top:50%; transform:translateY(-50%); padding:2px 4px; }
.resize-handle:hover { color:rgba(255,255,255,.8); background:rgba(255,255,255,.1); border-radius:3px; }
.task-block[draggable="true"] { cursor:grab; }
.task-block.dragging { opacity:.3; }
.task-block.resizing { opacity:.6; }
td.drop-target { background: rgba(56,189,248,.15) !important; outline:2px dashed var(--accent); outline-offset:-2px; }
td.drop-invalid { background: rgba(239,68,68,.1) !important; }

/* ── 导出面板 ── */
.export-panel {
  display:none; position:fixed; bottom:0; left:0; right:0; z-index:250;
  background:#111827; border-top:1px solid var(--border);
  padding:16px 28px; max-height:35vh; overflow-y:auto;
}
.export-panel.active { display:block; }
.export-panel h3 { font-size:16px; margin-bottom:10px; display:flex; justify-content:space-between; }
.export-panel pre {
  background:#0f172a; padding:14px; border-radius:8px; font-size:13px;
  overflow-x:auto; white-space:pre-wrap; font-family:'Consolas','Courier New',monospace;
  color:var(--green); max-height:22vh; overflow-y:auto;
}
.export-panel .export-actions { display:flex; gap:8px; margin-top:10px; }
.export-panel button { padding:8px 16px; border-radius:6px; font-size:13px; cursor:pointer; font-family:inherit; }
</style>
</head>
<body>

<div class="top-bar">
  <div>
    <h1>河南航投航空培训中心 <span>模拟机排程展板 · 2026年6月</span></h1>
    <span class="update-time" id="updateTime"></span>
  </div>
  <div class="right-ctrls">

    <button class="ctrl-btn export" onclick="toggleExportPanel()">📤 导出变更</button>
    <button class="ctrl-btn danger" onclick="clearAllChanges()">↺ 撤销变更</button>
    <span class="change-badge" id="changeBadge">0</span>
  </div>
</div>
<div class="legend" id="legend"></div>
<div class="table-wrap"><table id="ganttTable"><thead id="ganttHead"></thead><tbody id="ganttBody"></tbody></table></div>
<div class="tooltip" id="tooltip"></div>

<!-- 编辑模态框 -->
<div class="modal-overlay" id="modalOverlay" onclick="if(event.target===this) closeModal()">
  <div class="modal-box" id="modalBox"></div>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<!-- 导出面板 -->
<div class="export-panel" id="exportPanel">
  <h3>
    📤 变更数据导出

    <button class="ctrl-btn" onclick="downloadExport()">💾 下载 JSON 文件</button>
    <button class="ctrl-btn" style="color:var(--muted)" onclick="toggleExportPanel()">关闭</button>
  </div>
</div>

// 给每条记录生成稳定 ID
function taskId(t) {
  return [t.日期, t.起, t.止, t.机位, t.学员||'', t.客户航司||''].join('|').replace(/\s/g,'');
}

// 初始化 ID 映射; 从 localStorage 加载变更
let idMap = {};  // id → original task
ALL.forEach((t,i) => { t._id = taskId(t); idMap[t._id] = t; });

function loadChanges() {
  try {
    const raw = localStorage.getItem(LS_KEY);
    if (!raw || raw === 'null' || raw === 'undefined') return { added:[], modified:{}, deleted:[] };
    const parsed = JSON.parse(raw);
    if (!parsed || typeof parsed !== 'object' || Array.isArray(parsed)) return { added:[], modified:{}, deleted:[] };
    return { added: parsed.added || [], modified: parsed.modified || {}, deleted: parsed.deleted || [] };
  } catch(e) { return { added:[], modified:{}, deleted:[] }; }
}
function saveChanges(changes) {
  localStorage.setItem(LS_KEY, JSON.stringify(changes));
}

// 合并原始数据 + 变更 → 渲染用数据
function getEffectiveTasks() {
  const ch = loadChanges();
  const deletedSet = new Set(ch.deleted || []);
  const modifiedMap = ch.modified || {};
  const addedList = ch.added || [];

  // 原始数据中排除已删除的，应用修改
  let effective = ALL.filter(t => !deletedSet.has(t._id)).map(t => {
    if (modifiedMap[t._id]) {
      return { ...modifiedMap[t._id], _id: t._id, _status: 'modified' };
    }
    return { ...t, _status: 'original' };
  });

  // 追加新增
  addedList.forEach(t => {
    t._status = 'added';
    effective.push(t);
  });

  return effective;
}

function updateBadge() {
  const ch = loadChanges();
  const total = (ch.added||[]).length + Object.keys(ch.modified||{}).length + (ch.deleted||[]).length;
  const badge = document.getElementById('changeBadge');
  if (total > 0) {
    badge.style.display = 'inline-flex';
    badge.textContent = total;
  } else {
    badge.style.display = 'none';
  }
}

function tm(s) {
  if (!s || s==='nan') return 0;
  const t = s.includes(' ') ? s.split(' ')[1] : s;
  const p = t.split(':');
  return parseInt(p[0])*60 + parseInt(p[1]);
}
function db(val) { return val && val !== 'nan' ? val : ''; }
function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

// 拖拽
// ══════════════════════════════════════════════
let dragInfo = null;

function handleDragStart(e) {
  const el = e.target.closest('.task-block');
  if (!el) return;
  dragInfo = {
    taskId: el.dataset.taskId,
    colspan: parseInt(el.dataset.colspan) || 1,
    duration: parseFloat(el.dataset.duration) || 2
  };
  e.dataTransfer.effectAllowed = 'move';
  e.dataTransfer.setData('text/plain', dragInfo.taskId);
  setTimeout(() => el.classList.add('dragging'), 0);
}

function handleDragEnd(e) {
  const el = e.target.closest('.task-block');
  if (el) el.classList.remove('dragging');
  dragInfo = null;
  document.querySelectorAll('.drop-target,.drop-invalid').forEach(c => c.classList.remove('drop-target','drop-invalid'));
}

function handleDragOver(e) {
  e.preventDefault();
  e.dataTransfer.dropEffect = 'move';
  const td = e.target.closest('td');
  if (!td || !td.dataset.day || !dragInfo) return;

  document.querySelectorAll('.drop-target,.drop-invalid').forEach(c => c.classList.remove('drop-target','drop-invalid'));

  const colspan = dragInfo.colspan;
  const cells = td.closest('tr').querySelectorAll('td');
  let startIdx = -1;
  for (let i = 0; i < cells.length; i++) {
    if (cells[i] === td) { startIdx = i; break; }
  }
  // Don't highlight the date label cell (index 0)
  if (startIdx < 1) return;
  // Check if the full span fits
  const endIdx = startIdx + colspan - 1;
  if (endIdx < cells.length) {
    for (let i = startIdx; i <= endIdx; i++) cells[i].classList.add('drop-target');
  } else {
    td.classList.add('drop-invalid');
  }
}

function handleDrop(e) {
  e.preventDefault();
  document.querySelectorAll('.drop-target,.drop-invalid').forEach(c => c.classList.remove('drop-target','drop-invalid'));

  const td = e.target.closest('td');
  if (!td || !td.dataset.day || !dragInfo) return;

  const day = parseInt(td.dataset.day);
  const slot = parseInt(td.dataset.slot);
  const loSlot = parseInt(td.dataset.loSlot);
  const absoluteSlot = loSlot + slot;
  const taskId = decodeURIComponent(dragInfo.taskId);
  const colspan = dragInfo.colspan;
  const endSlot = absoluteSlot + colspan;

  const sh = Math.floor(absoluteSlot/4), sm = (absoluteSlot%4)*15;
  const eh = Math.floor(endSlot/4), em = (endSlot%4)*15;
  const newDate = `${YEAR}-${MONTH.toString().padStart(2,'0')}-${day.toString().padStart(2,'0')}`;
  const startStr = `${sh.toString().padStart(2,'0')}:${sm.toString().padStart(2,'0')}`;
  const endStr = `${eh.toString().padStart(2,'0')}:${em.toString().padStart(2,'0')}`;

  const effective = getEffectiveTasks();
  const task = effective.find(t => t._id === taskId);
  if (!task) return;

  const updated = { ...task };
  updated.日期 = newDate;
  updated.起 = `${newDate} ${startStr}`;
  updated.止 = `${newDate} ${endStr}`;
  updated.时长h = colspan * 0.25;

  const ch = loadChanges();
  const isNew = ch.added.some(t => t._id === taskId);
  if (isNew) {
    ch.added = ch.added.map(t => t._id === taskId ? updated : t);
  } else {
    if (ch.deleted && ch.deleted.includes(taskId)) {
      ch.deleted = ch.deleted.filter(d => d !== taskId);
    }
    ch.modified[taskId] = updated;
  }
  saveChanges(ch);
  dragInfo = null;
  render();
  toast('已移动', 'success');
}

// ══════════════════════════════════════════════
// 拉长/缩短（resize）
// ══════════════════════════════════════════════
let resizeState = null;

function handleResizeStart(e, encodedId) {
  e.stopPropagation();
  e.preventDefault();
  const block = e.target.closest('.task-block');
  const td = block.closest('td');
  const taskId = decodeURIComponent(encodedId);
  const colspan = parseInt(block.dataset.colspan) || 1;
  const day = parseInt(td.dataset.day);
  const slot = parseInt(td.dataset.slot);
  const loSlot = parseInt(td.dataset.loSlot);

  resizeState = {
    taskId, colspan, day, slot, loSlot,
    startX: e.clientX, block, td,
    row: td.closest('tr')
  };
  block.classList.add('resizing');
  document.addEventListener('mousemove', handleResizeMove);
  document.addEventListener('mouseup', handleResizeEnd);
}

function handleResizeMove(e) {
  if (!resizeState) return;
  const rs = resizeState;
  const cells = rs.row.querySelectorAll('td');
  const baseIdx = (rs.block.closest('td').dataset.slot !== undefined)
    ? parseInt(rs.block.closest('td').dataset.slot)
    : rs.slot;

  const firstTimeCell = cells[1];
  if (!firstTimeCell) return;
  const cellWidth = firstTimeCell.offsetWidth || 30;
  const rect = firstTimeCell.getBoundingClientRect();
  const deltaSlots = Math.round((e.clientX - rect.right + cellWidth/2) / cellWidth) - baseIdx;
  const newColspan = Math.max(1, rs.colspan + deltaSlots);

  if (baseIdx + newColspan > cells.length - 1) return;

  // 只用 CSS 宽度预览，不改 colspan（避免 table reflow 影响相邻格）
  rs.block.style.width = (newColspan * cellWidth) + 'px';
  rs.block.dataset.colspan = newColspan;

  const newDuration = (newColspan * 0.25).toFixed(1);
  const timeEl = rs.block.querySelector('.time');
  if (timeEl) {
    const parts = timeEl.textContent.split(' (');
    if (parts.length >= 2) timeEl.textContent = parts[0] + ' (' + newDuration + 'h)';
  }
}

function handleResizeEnd(e) {
  document.removeEventListener('mousemove', handleResizeMove);
  document.removeEventListener('mouseup', handleResizeEnd);
  if (!resizeState) return;
  const rs = resizeState;

  const newColspan = parseInt(rs.block.dataset.colspan) || rs.colspan;
  const newDuration = parseFloat((newColspan * 0.25).toFixed(1));
  const taskId = rs.taskId;

  // 查找任务
  const effective = getEffectiveTasks();
  const task = effective.find(t => t._id === taskId);
  if (!task) { resizeState = null; render(); return; }

  const updated = { ...task };
  updated.时长h = newDuration;
  // 重新计算结束时间
  const startMin = tm(task.起);
  const endMin = startMin + newDuration * 60;
  const eh = Math.floor(endMin / 60), em = endMin % 60;
  const dateStr = task.日期;
  updated.止 = `${dateStr} ${eh.toString().padStart(2,'0')}:${em.toString().padStart(2,'0')}`;

  const ch = loadChanges();
  const isNew = ch.added.some(t => t._id === taskId);
  if (isNew) {
    ch.added = ch.added.map(t => t._id === taskId ? updated : t);
  } else {
    if (ch.deleted && ch.deleted.includes(taskId)) {
      ch.deleted = ch.deleted.filter(d => d !== taskId);
    }
    ch.modified[taskId] = updated;
  }
  saveChanges(ch);
  resizeState = null;
  render();
  toast(`时长已更新为 ${newDuration}h`, 'success');
}

// ══════════════════════════════════════════════
// 渲染
// ══════════════════════════════════════════════
function render() {
  try {
  const filter = document.getElementById('craftFilter').value;
  let tasks = getEffectiveTasks();
  if (filter !== 'all') tasks = tasks.filter(t => t.机位 === filter);

  let loMin = 24*60, hiMin = 0;
  tasks.forEach(t => {
    const s = tm(t.起), e = tm(t.止);
    if (s>0) loMin = Math.min(loMin, s);
    if (e>0) hiMin = Math.max(hiMin, e);
  });
  if (loMin >= hiMin) { loMin = 7*60; hiMin = 22*60; }
  const loSlot = Math.max(0, Math.floor(loMin/15) - 4);
  const hiSlot = Math.ceil(hiMin/15) + 4;

  function slotH(slot) { return Math.floor(slot/4); }
  function slotLabel(slot) { const m=(slot%4)*15; return `${slotH(slot).toString().padStart(2,'0')}:${m.toString().padStart(2,'0')}`; }

  const grid = {}; const stackByDay = {};
  tasks.forEach(t => {
    if (!t.日期 || t.日期==='nan') return;
    const day = parseInt(t.日期.substring(8,10));
    const sm = tm(t.起), em = tm(t.止);
    const startSlot = Math.max(0, Math.floor(sm/15));
    const endSlot = Math.ceil(em/15);
    const client = db(t.客户航司);
    const color = COLORS[client] || COLORS['default'] || {bg:'#6b7280',hover:'#4b5563',text:'#fff'};
    if (!grid[day]) grid[day] = {};
    if (!stackByDay[day]) stackByDay[day] = {};

    for (let si = startSlot; si < endSlot; si++) {
      if (si < loSlot || si >= hiSlot) continue;
      const idx = si - loSlot;
      if (!grid[day][idx]) grid[day][idx] = [];
      // 避免重复添加
      if (!grid[day][idx].some(e => e._id === t._id)) {
        grid[day][idx].push({
          client, course: db(t.课目类型),
          stStr: (t.起||'').split(' ').pop()||'',
          etStr: (t.止||'').split(' ').pop()||'',
          duration: db(t.时长h),
          students: db(t.学员), trainer: db(t.教员), inspector: db(t.检查员),
          color, colspan: 1, isStart: false,
          _id: t._id, _status: t._status
        });
      }
      stackByDay[day][idx] = (stackByDay[day][idx]||0) + 1;
    }
    const firstIdx = startSlot - loSlot;
    const arr = grid[day] && grid[day][firstIdx];
    if (arr) {
      const mine = arr.find(e => e._id === t._id);
      if (mine) {
        mine.isStart = true;
        mine.colspan = Math.min(endSlot, hiSlot) - Math.max(startSlot, loSlot);
      }
    }
  });

  const usedDays = Object.keys(grid).map(Number).sort((a,b)=>a-b);
  const WDAYS = ['日','一','二','三','四','五','六'];

  const clients = [...new Set(tasks.map(t=>db(t.客户航司)).filter(Boolean))];
  document.getElementById('legend').innerHTML = clients.map(c => {
    const co = COLORS[c]||COLORS['default']||{bg:'#6b7280'};
    return `<div class="legend-item"><span class="legend-dot" style="background:${co.bg}"></span>${c}</div>`;
  }).join('');
  document.getElementById('stats').innerHTML = `<strong>${tasks.length}</strong>场 · <strong>${clients.length}</strong>家航司`;

  let thead = '<tr><th class="corner date-col">日期<br>航司</th>';
  for (let si=loSlot; si<hiSlot; si++) thead += `<th>${slotLabel(si)}</th>`;
  thead += '</tr>';
  document.getElementById('ganttHead').innerHTML = thead;

  let tbody = '';
  usedDays.forEach(day => {
    const ds = `${YEAR}-${MONTH.toString().padStart(2,'0')}-${day.toString().padStart(2,'0')}`;
    const wd = WDAYS[new Date(ds).getDay()];
    const maxStack = Math.max(...Object.values(stackByDay[day]||{}), 1);
    const rowH = Math.max(58, maxStack * 44);
    tbody += `<tr style="height:${rowH}px"><td style="height:${rowH}px">${day}<span class="dow"> 周${wd}</span></td>`;

    let si = loSlot;
    while (si < hiSlot) {
      const idx = si - loSlot;
      const arr = grid[day] && grid[day][idx];
      const startTasks = arr ? arr.filter(g => g.isStart) : [];

      if (startTasks.length > 0) {
        const maxColspan = Math.max(...startTasks.map(g => g.colspan));
        const n = startTasks.length;
        const blocksHTML = startTasks.map((g, i) => {
          const statusClass = g._status === 'added' ? ' added' : g._status === 'modified' ? ' changed' : '';
          const encodedId = encodeURIComponent(g._id||'');
          const hPct = n > 1 ? (100/n).toFixed(1) + '%' : '100%';
          return `<div class="task-block${statusClass}" style="background:${g.color.bg};color:${g.color.text};height:${hPct};min-height:0;flex-shrink:0"
            draggable="true"
            data-task-id="${encodedId}"
            data-colspan="${g.colspan}"
            data-duration="${g.duration}"
            ondragstart="handleDragStart(event)"
            ondragend="handleDragEnd(event)"
            onclick="openEditModal('${encodedId}')"
            onmouseenter="showTip(event, '${esc(g.course)}','${esc(g.stStr)}','${esc(g.etStr)}','${esc(g.duration)}','${esc(g.students)}','${esc(g.trainer)}','${esc(g.inspector)}')"
            onmouseleave="hideTip()">
            <span class="drag-handle">⋮⋮</span>
            <span class="edit-icon">✎</span>
            <span class="client">${esc(g.client.replace('航空',''))}</span>
            <span class="time">${esc(g.stStr)}-${esc(g.etStr)} (${esc(g.duration)}h)</span>
            <span class="resize-handle" onmousedown="handleResizeStart(event,'${encodedId}')" onclick="event.stopPropagation()">║</span>
          </div>`;
        }).join('');
        tbody += `<td colspan="${maxColspan}" data-day="${day}" data-slot="${idx}" data-lo-slot="${loSlot}" style="vertical-align:top;padding:0">${blocksHTML}</td>`;
        si += maxColspan;
      } else {
        tbody += `<td class="empty" data-day="${day}" data-slot="${idx}" data-lo-slot="${loSlot}" ondragover="handleDragOver(event)" ondrop="handleDrop(event)"></td>`;
        si++;
      }
    }
    tbody += '</tr>';
  });
  document.getElementById('ganttBody').innerHTML = tbody;

  updateBadge();
  document.getElementById('updateTime').textContent =
    `最后更新: ${new Date().toLocaleString('zh-CN',{timeZone:'Asia/Shanghai'})} CST`;
  } catch(e) {
    document.getElementById('ganttBody').innerHTML =
      `<tr><td colspan="100" style="padding:40px;color:#ef4444;font-size:14px;text-align:center">
        渲染错误: ${e.message}<br><span style="font-size:11px;color:#94a3b8">
        请尝试「撤销变更」清除本地缓存后刷新页面</span></td></tr>`;
    document.getElementById('stats').innerHTML = '<strong style="color:#ef4444">渲染失败</strong>';
    console.error('Board render error:', e);
  }
}

// ══════════════════════════════════════════════
// 提示框 (字符串参数版本)
// ══════════════════════════════════════════════
function showTip(e, course, stStr, etStr, duration, students, trainer, inspector) {
  const tt = document.getElementById('tooltip');
  const lines = [];
  if (course) lines.push(`<b>${course}</b>`);
  lines.push(`<span class="dim">时间:</span> ${stStr} - ${etStr} (${duration}h)`);
  if (students) lines.push(`<span class="dim">学员:</span> ${students}`);
  if (trainer) lines.push(`<span class="dim">教员:</span> ${trainer}`);
  if (inspector) lines.push(`<span class="dim">检查员:</span> ${inspector}`);
  tt.innerHTML = lines.join('<br>');
  tt.classList.add('show');
  const x = Math.min(e.clientX+14, window.innerWidth-340);
  tt.style.left = x+'px';
  tt.style.top = (e.clientY-10)+'px';
}
function hideTip() { document.getElementById('tooltip').classList.remove('show'); }

// ══════════════════════════════════════════════
// 模态框
// ══════════════════════════════════════════════
let currentEditId = null;

function openEditModal(id) {
  currentEditId = decodeURIComponent(id);
  const effective = getEffectiveTasks();
  const task = effective.find(t => t._id === currentEditId);
  if (!task) return;
  buildModal('edit', task);
}

function openAddModal() {
  currentEditId = null;
  buildModal('add', {
    日期: `${YEAR}-${MONTH.toString().padStart(2,'0')}-15`, 起: '', 止: '',
    课目类型: '', 学员: '', 教员: '', 检查员: '',
    客户航司: '', 机位: 'B737NG-1', 时长h: 2
  });
}

function buildModal(mode, task) {
  const tagClass = mode === 'add' ? 'new' : 'edit';
  const tagText = mode === 'add' ? '新增' : '编辑';
  const titleText = mode === 'add' ? '新增训练任务' : '编辑训练任务';

  // 生成下拉选项
  const courseOpts = COURSE_OPTIONS.map(c =>
    `<option value="${esc(c)}" ${task.课目类型===c?'selected':''}>${c}</option>`).join('');
  const clientOpts = CLIENT_OPTIONS.map(c =>
    `<option value="${esc(c)}" ${task.客户航司===c?'selected':''}>${c}</option>`).join('');
  const posOpts = POSITION_OPTIONS.map(p =>
    `<option value="${esc(p)}" ${task.机位===p?'selected':''}>${p}</option>`).join('');

  const html = `
    <h2>${titleText} <span class="tag ${tagClass}">${tagText}</span></h2>
    <div class="form-row">
      <label>日期 <input type="date" id="fDate" value="${task.日期||''}"></label>
      <label>机位
        <select id="fPos">${posOpts}</select>
      </label>
    </div>
    <div class="form-row">
      <label>开始时间 <input type="time" id="fStart" value="${(task.起||'').split(' ').pop()||''}" onchange="calcDuration()"></label>
      <label>结束时间 <input type="time" id="fEnd" value="${(task.止||'').split(' ').pop()||''}" onchange="calcDuration()"></label>
      <label>时长(h) <input type="text" id="fDur" value="${task.时长h||2}" style="width:60px" readonly></label>
    </div>
    <div class="form-row">
      <label>课目类型
        <select id="fCourse">${courseOpts}</select>
      </label>
      <label>客户航司
        <select id="fClient">${clientOpts}</select>
      </label>
    </div>
    <div class="form-row">
      <label>学员 <input type="text" id="fStudents" value="${esc(task.学员||'')}" placeholder="多人用空格分隔"></label>
    </div>
    <div class="form-row">
      <label>教员 <input type="text" id="fTrainer" value="${esc(task.教员||'')}"></label>
      <label>检查员 <input type="text" id="fInspector" value="${esc(task.检查员||'')}"></label>
    </div>
    <div class="form-actions">
      ${mode==='edit' ? '<button class="btn-delete" onclick="deleteTask()">🗑 删除此任务</button>' : ''}
      <button class="btn-cancel" onclick="closeModal()">取消</button>
      <button class="btn-save" onclick="saveTask('${mode}')">💾 保存</button>
    </div>
  `;

  document.getElementById('modalBox').innerHTML = html;
  document.getElementById('modalOverlay').classList.add('active');
}

function closeModal() {
  document.getElementById('modalOverlay').classList.remove('active');
  currentEditId = null;
}

function calcDuration() {
  const sv = document.getElementById('fStart').value;
  const ev = document.getElementById('fEnd').value;
  if (!sv || !ev) return;
  const [sh, sm] = sv.split(':').map(Number);
  const [eh, em] = ev.split(':').map(Number);
  const mins = (eh*60+em) - (sh*60+sm);
  const dur = mins > 0 ? (mins/60) : 0;
  document.getElementById('fDur').value = dur.toFixed(1);
}

function saveTask(mode) {
  const dateVal = document.getElementById('fDate').value;
  const startVal = document.getElementById('fStart').value;
  const endVal = document.getElementById('fEnd').value;

  if (!dateVal) { toast('请填写日期', 'error'); return; }
  if (!startVal) { toast('请填写开始时间', 'error'); return; }
  if (!endVal) { toast('请填写结束时间', 'error'); return; }

  // 自动计算时长
  const [sh, sm] = startVal.split(':').map(Number);
  const [eh, em] = endVal.split(':').map(Number);
  const totalMin = (eh*60+em) - (sh*60+sm);
  const duration = totalMin > 0 ? parseFloat((totalMin/60).toFixed(1)) : 0.25;

  const task = {
    日期: dateVal,
    起: `${dateVal} ${startVal}`,
    止: `${dateVal} ${endVal}`,
    课目类型: document.getElementById('fCourse').value,
    学员: document.getElementById('fStudents').value || null,
    教员: document.getElementById('fTrainer').value || null,
    检查员: document.getElementById('fInspector').value || null,
    客户航司: document.getElementById('fClient').value,
    机位: document.getElementById('fPos').value,
    时长h: duration
  };

  const ch = loadChanges();

  if (mode === 'add') {
    task._id = 'new_' + Date.now() + '_' + Math.random().toString(36).slice(2,6);
    ch.added.push(task);
  } else {
    // 修改
    if (ch.deleted.includes(currentEditId)) {
      ch.deleted = ch.deleted.filter(d => d !== currentEditId);
    }
    task._id = currentEditId;
    ch.modified[currentEditId] = task;
  }

  saveChanges(ch);
  closeModal();
  render();
  toast(mode === 'add' ? '任务已新增' : '任务已修改', 'success');
}

function deleteTask() {
  if (!confirm('确定要删除这个训练任务吗？\n\n此操作仅标记删除，可以在「导出变更」前撤销。')) return;

  const ch = loadChanges();
  // 如果这是新增的，直接移除; 否则加入 deleted
  const isNew = ch.added.some(t => t._id === currentEditId);
  if (isNew) {
    ch.added = ch.added.filter(t => t._id !== currentEditId);
    // 也清理 modified 中可能残留的
    delete ch.modified[currentEditId];
  } else {
    if (!ch.deleted.includes(currentEditId)) ch.deleted.push(currentEditId);
    delete ch.modified[currentEditId];
  }
  saveChanges(ch);
  closeModal();
  render();
  toast('任务已标记删除', 'success');
}

// ══════════════════════════════════════════════
// 导出 & 撤销
// ══════════════════════════════════════════════
function toggleExportPanel() {
  const panel = document.getElementById('exportPanel');
  const ch = loadChanges();
  const total = (ch.added||[]).length + Object.keys(ch.modified||{}).length + (ch.deleted||[]).length;

  if (total === 0) {
    toast('暂无变更数据', 'error');
    return;
  }

  const exportData = {
    exportedAt: new Date().toISOString(),
    sourceSmartTable: '航空培训中心-模拟机排程试点-v0.1 > 训练任务',
    sourceUrl: 'https://docs.qq.com/smartsheet/DTXpSY2hueUVsWG9m',
    month: `${YEAR}-${MONTH}`,
    changes: {
      added: ch.added.map(({_id,_status,...t}) => t),
      modified: Object.fromEntries(
        Object.entries(ch.modified).map(([id, {_id,_status,...t}]) => [id, t])
      ),
      deleted: ch.deleted
    },
    summary: {
      addedCount: (ch.added||[]).length,
      modifiedCount: Object.keys(ch.modified||{}).length,
      deletedCount: (ch.deleted||[]).length
    }
  };

  document.getElementById('exportContent').textContent = JSON.stringify(exportData, null, 2);
  panel.classList.add('active');
}

function copyExport() {
  const text = document.getElementById('exportContent').textContent;
  navigator.clipboard.writeText(text).then(() => toast('已复制到剪贴板', 'success'));
}

function downloadExport() {
  const text = document.getElementById('exportContent').textContent;
  const blob = new Blob([text], {type:'application/json'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `HNAT_展板变更_${YEAR}-${MONTH}_${new Date().toISOString().slice(0,10)}.json`;
  a.click();
  URL.revokeObjectURL(url);
  toast('已下载 JSON 文件', 'success');
}

function clearAllChanges() {
  const ch = loadChanges();
  const total = (ch.added||[]).length + Object.keys(ch.modified||{}).length + (ch.deleted||[]).length;
  if (total === 0) { toast('没有可撤销的变更', 'error'); return; }
  if (!confirm(`确定要撤销全部 ${total} 条变更吗？\n\n此操作不可恢复。`)) return;

  saveChanges({added:[], modified:{}, deleted:[]});
  document.getElementById('exportPanel').classList.remove('active');
  render();
  toast('所有变更已撤销', 'success');
}

// ══════════════════════════════════════════════
// Toast 提示
// ══════════════════════════════════════════════
function toast(msg, type) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = 'toast ' + type + ' show';
  setTimeout(() => { el.className = 'toast'; }, 2000);
}

// ══════════════════════════════════════════════
// 启动
// ══════════════════════════════════════════════
(function init() {
  // 清理脏数据
  const raw = localStorage.getItem(LS_KEY);
  if (raw && (raw === 'null' || raw === 'undefined' || raw === '""')) {
    localStorage.removeItem(LS_KEY);
  } else if (raw) {
    try {
      const p = JSON.parse(raw);
      if (!p || typeof p !== 'object' || Array.isArray(p)) {
        localStorage.removeItem(LS_KEY);
      }
    } catch(e) { localStorage.removeItem(LS_KEY); }
  }
  // 全局拖放拦截（防止浏览器打开文件）
  document.addEventListener('dragover', e => {
    if (!e.target.closest('.table-wrap')) return;
    e.preventDefault();
  });
  render();
})();
</script>
